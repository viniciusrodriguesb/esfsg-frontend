<div class="flex flex-col gap-3.5">
    <div class="flex flex-col gap-3.5 p-6 relative">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div
            class="bg-gray-200 flex items-center justify-center h-5 w-5 rounded-full"
          >
            <i-lucide class="w-2.5" name="lock"></i-lucide>
          </div>
  
          <p class="font-bold text-size-base sm:text-size-md">Alterar permissão</p>
        </div>
  
        <button
          (click)="fecharModal()"
          class="flex items-center justify-center h-7 w-7 rounded-full"
        >
          <i-lucide class="w-3.5 text-rose-500" name="circle-x"></i-lucide>
        </button>
      </div>
      <span class="h-0.5 bg-[#F6F6F6]"></span>
      <form
        class="pt-1 pb-3"
        [formGroup]="formSenha"
      >
        <div class="grid grid-cols-8 gap-3.5">
          <app-input
            class="col-start-1 col-end-9"
            [tipo]="'password'"
            [label]="'Nova senha *'"
            [placeholder]="'Selecione'"
            [formController]="formSenha.controls['senha']"
          ></app-input>
          <app-input
            class="col-start-1 col-end-9"
            [tipo]="'password'"
            [label]="'Repita a senha *'"
            [placeholder]="'Selecione'"
            [formController]="formSenha.controls['confirmacao']"
          ></app-input>
        </div>
      </form>
  
      <button
      [disabled]="!formSenha.valid"
      [ngClass]="{ 'opacity-50 cursor-not-allowed': !formSenha.valid }"
        class="bg-[#007AFF] w-full text-size-md text-white font-semibold rounded-[0.5rem] py-2.5 flex items-center justify-center gap-2"
        (click)="editarSenhaUsuario()"
      >
        Editar
        <i-lucide class="w-4" name="check-check"></i-lucide>
      </button>
    </div>
  </div>
